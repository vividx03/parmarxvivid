<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid Academy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; transition: all 0.2s ease; }
        .glass-card:active { transform: scale(0.98); }
        .search-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(59, 130, 246, 0.3); transition: all 0.3s; }
        .search-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .hidden { display: none; }
        .btn-action { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3); }
    </style>
</head>
<body class="p-4 pb-28">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-500">VIVID ACADEMY</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-1 font-semibold">Quality Education Hub</p>
        </header>

        <div id="search-container" class="mb-6">
            <div class="search-box flex items-center px-4 py-3 rounded-2xl">
                <i class="fas fa-search text-gray-500 mr-3"></i>
                <input type="text" id="courseSearch" placeholder="Search courses (Math, GS...)" 
                    class="bg-transparent border-none outline-none w-full text-sm text-white placeholder-gray-500"
                    onkeyup="filterCourses()">
            </div>
        </div>

        <h2 id="view-title" class="text-xs font-bold mb-4 text-blue-300 uppercase tracking-widest opacity-80">AVAILABLE COURSES</h2>

        <div id="course-list" class="grid gap-3"></div>
        <div id="no-results" class="hidden text-center py-10">
            <i class="fas fa-ghost text-4xl text-gray-700 mb-3"></i>
            <p class="text-gray-500 font-medium">No courses found</p>
        </div>

        <div id="subject-section" class="hidden grid gap-3">
            <div id="subject-list" class="grid gap-3"></div>
            <button onclick="renderCourses()" class="mt-4 p-4 glass-card w-full text-sm font-bold text-gray-400">BACK TO HOME</button>
        </div>
        <div id="category-section" class="hidden grid gap-3">
            <div id="category-list" class="grid gap-3"></div>
            <button onclick="toggle('subject-section')" class="mt-4 p-4 glass-card w-full text-sm font-bold text-gray-400">BACK</button>
        </div>
        <div id="content-section" class="hidden grid gap-3">
            <div id="chapter-list" class="grid gap-3"></div>
            <button onclick="toggle('category-section')" class="mt-4 p-4 glass-card w-full text-sm font-bold text-gray-400">BACK</button>
        </div>

        <footer class="fixed bottom-0 left-0 w-full p-4 bg-slate-900/80 backdrop-blur-xl border-t border-white/5">
            <div class="flex justify-around items-center max-w-md mx-auto">
                <a href="https://whatsapp.com/channel/0029VbBjUBM0wajzBk92iw2q" target="_blank" class="flex flex-col items-center text-green-500">
                    <i class="fab fa-whatsapp text-xl"></i><span class="text-[8px] mt-1">WhatsApp</span>
                </a>
                <a href="https://t.me/vividx_03" target="_blank" class="flex flex-col items-center text-blue-400">
                    <i class="fab fa-telegram-plane text-xl"></i><span class="text-[8px] mt-1">Telegram</span>
                </a>
                <a href="#" class="flex flex-col items-center text-pink-500">
                    <i class="fab fa-instagram text-xl"></i><span class="text-[8px] mt-1">Instagram</span>
                </a>
                <a href="#" class="flex flex-col items-center text-red-500">
                    <i class="fab fa-youtube text-xl"></i><span class="text-[8px] mt-1">YouTube</span>
                </a>
            </div>
        </footer>
    </div>

    <script>
        let mainData = null;
        function loadData() { 
            fetch('db.json?v=' + Date.now()).then(res => res.json()).then(data => { 
                mainData = data; 
                renderCourses(); 
            }); 
        }
        
        function renderCourses() { 
            document.getElementById('view-title').innerText = "AVAILABLE COURSES";
            document.getElementById('search-container').classList.remove('hidden');
            const list = document.getElementById('course-list'); 
            list.innerHTML = ''; 
            mainData.courses.forEach((c, i) => { 
                let clickAction = c.directLink ? `window.open('${c.directLink}', '_blank')` : `selectCourse(${i})`;
                list.innerHTML += `<div onclick="${clickAction}" class="glass-card p-5 flex items-center cursor-pointer course-item">
                    <div class="w-10 h-10 btn-action rounded-full flex items-center justify-center mr-4 text-white">
                        <i class="fas fa-graduation-cap text-sm"></i>
                    </div>
                    <div>
                        <div class="font-bold text-sm tracking-tight">${c.name}</div>
                        <div class="text-[9px] text-gray-500 uppercase mt-0.5">${c.directLink ? 'Click to visit' : 'View Content'}</div>
                    </div>
                </div>`; 
            }); 
            toggle('course-list'); 
        }

        function filterCourses() {
            let input = document.getElementById('courseSearch').value.toUpperCase();
            let items = document.getElementsByClassName('course-item');
            let found = false;
            for (let i = 0; i < items.length; i++) {
                let name = items[i].getElementsByClassName('font-bold')[0].innerText;
                if (name.toUpperCase().indexOf(input) > -1) {
                    items[i].style.display = "";
                    found = true;
                } else {
                    items[i].style.display = "none";
                }
            }
            document.getElementById('no-results').classList.toggle('hidden', found);
        }

        function selectCourse(i) { 
            document.getElementById('search-container').classList.add('hidden');
            document.getElementById('view-title').innerText = mainData.courses[i].name; 
            const list = document.getElementById('subject-list'); list.innerHTML = ''; 
            mainData.courses[i].subjects.forEach((s, si) => { 
                list.innerHTML += `<div onclick="showCategories(${si})" class="glass-card p-4 flex justify-between items-center cursor-pointer">
                    <span class="font-semibold text-sm tracking-wide">${s.name}</span>
                    <i class="fas fa-chevron-right text-blue-500 text-xs"></i>
                </div>`; 
            }); 
            toggle('subject-section'); 
        }

        function showCategories(si) { 
            document.getElementById('view-title').innerText = "Select Category"; 
            document.getElementById('category-list').innerHTML = `
                <div onclick="showItems('CHAPTERS')" class="glass-card p-5 border-l-4 border-blue-500 cursor-pointer flex items-center">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center mr-4"><i class="fas fa-folder-open text-blue-500"></i></div>
                    <span class="font-bold text-sm">CHAPTER-WISE CONTENT</span>
                </div>
                <div onclick="showItems('WEEKLY TESTS')" class="glass-card p-5 border-l-4 border-green-500 cursor-pointer flex items-center">
                    <div class="w-8 h-8 rounded-lg bg-green-500/10 flex items-center justify-center mr-4"><i class="fas fa-vial text-green-500"></i></div>
                    <span class="font-bold text-sm">WEEKLY MOCK TESTS</span>
                </div>`; 
            toggle('category-section'); 
        }

        function showItems(type) { 
            document.getElementById('view-title').innerText = type; 
            const list = document.getElementById('chapter-list'); 
            list.innerHTML = ''; 
            const items = mainData.courses[curC].subjects[curS][type] || [];
            if(items.length === 0) list.innerHTML = '<p class="text-center text-gray-600 text-sm mt-10">No content available</p>';
            items.forEach(ch => { 
                list.innerHTML += `<div class="glass-card p-4">
                    <h4 class="font-bold mb-4 text-gray-200 text-xs leading-snug">${ch.title}</h4>
                    <div class="grid grid-cols-2 gap-2 text-[9px] font-bold">
                        ${ch.url ? `<a href="${ch.url}" target="_blank" class="btn-action p-2.5 rounded-lg text-center flex items-center justify-center"><i class="fas fa-play mr-2"></i>LECTURE</a>` : ''}
                        ${ch.notes_en ? `<a href="${ch.notes_en}" target="_blank" class="bg-gray-800 p-2.5 rounded-lg text-center border border-white/5">ENG NOTES</a>` : ''}
                        ${ch.notes_hi ? `<a href="${ch.notes_hi}" target="_blank" class="bg-gray-800 p-2.5 rounded-lg text-center border border-white/5">HINDI NOTES</a>` : ''}
                        ${ch.quiz ? `<a href="${ch.quiz}" target="_blank" class="bg-blue-900/40 p-2.5 rounded-lg text-center border border-blue-500/20 text-blue-400">QUIZ</a>` : ''}
                        ${ch.handwritten ? `<a href="${ch.handwritten}" target="_blank" class="bg-teal-900/40 p-2.5 rounded-lg text-center border border-teal-500/20 text-teal-400">PPT/PDF</a>` : ''}
                    </div>
                </div>`; 
            }); 
            toggle('content-section'); 
        }

        function toggle(id) { 
            ['course-list', 'subject-section', 'category-section', 'content-section'].forEach(d => document.getElementById(d).classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
            if(id === 'course-list') document.getElementById('search-container').classList.remove('hidden');
            window.scrollTo(0,0);
        }
        loadData();
    </script>
</body>
</html>
